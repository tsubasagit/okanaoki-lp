<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FLUX RING — WebGL ヒーロー試作</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500&family=Shippori+Mincho:wght@500&display=swap">
<style>
  :root{
    --page:#0E0C20; --text:#ECEEF7; --sub:#9498BE; --cyan:#60CEE0;
    --sans:"Zen Kaku Gothic New",-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;
    --serif:"Shippori Mincho","Hiragino Mincho ProN","Yu Mincho",serif;
  }
  *{box-sizing:border-box} html,body{margin:0;height:100%}
  body{background:var(--page); color:var(--text); font-family:var(--sans);
    -webkit-font-smoothing:antialiased; letter-spacing:.04em; overflow:hidden;
    font-feature-settings:"palt" 1}
  #gl{position:fixed; inset:0; width:100%; height:100%; display:block; z-index:0}
  .fallback{position:fixed; inset:0; display:none; align-items:center; justify-content:center;
    color:var(--sub); font-size:13px; z-index:0; padding:24px; text-align:center}

  .hero{position:relative; z-index:1; min-height:100svh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; padding:84px 24px 64px}
  .eyebrow{font-size:11px; letter-spacing:.46em; color:var(--sub); font-weight:300; margin-bottom:34px}
  .appicon{width:158px; height:158px; border-radius:36px; position:relative;
    box-shadow:0 36px 70px rgba(18,12,46,.7),0 0 64px rgba(96,206,224,.16),
      inset 0 2px 1px rgba(255,255,255,.18),inset 0 -3px 6px rgba(0,0,0,.45)}
  .appicon img{display:block; width:100%; height:100%; border-radius:36px}
  .h-mark{font-size:12px; letter-spacing:.4em; color:var(--text); font-weight:300; margin:26px 0 0}
  .concept{margin-top:18px; font-family:var(--serif); font-size:23px; font-weight:500; letter-spacing:.16em}
  .concept .pt{color:var(--cyan)}
  .h-artist{margin-top:30px; font-size:14px; letter-spacing:.14em; font-weight:400}
  .h-role{margin-top:9px; font-size:11px; letter-spacing:.12em; color:var(--sub); font-weight:300}
  .tag{position:fixed; left:16px; bottom:14px; z-index:2; font-size:10px; letter-spacing:.18em;
    color:var(--sub); opacity:.7; font-weight:300}
  @media (prefers-reduced-motion:reduce){ .appicon{box-shadow:0 24px 50px rgba(18,12,46,.6)} }
</style>
</head>
<body>
  <canvas id="gl"></canvas>
  <div class="fallback" id="fb">この環境では WebGL を利用できません。</div>

  <header class="hero">
    <div class="eyebrow">F L U X　R I N G</div>
    <div class="appicon" id="icon"><img src="fluxring-icon.png" alt="FLUX RING" width="158" height="158"></div>
    <div class="h-mark">F L U X　R I N G</div>
    <div class="concept">静けさを、<span class="pt">調律</span>する。</div>
    <div class="h-artist">OKA</div>
    <div class="h-role">作曲・音響　／　株式会社ヌメロ.8 代表</div>
  </header>
  <div class="tag">WebGL 試作 ／ 音場シェーダ</div>

<script id="vs" type="x-shader/x-vertex">
attribute vec2 a; void main(){ gl_Position=vec4(a,0.0,1.0); }
</script>
<script id="fs" type="x-shader/x-fragment">
precision highp float;
uniform vec2 u_res; uniform float u_time; uniform vec2 u_mouse; uniform vec2 u_center; uniform float u_mi;

float hash(vec2 p){ p=fract(p*vec2(123.34,345.45)); p+=dot(p,p+34.345); return fract(p.x*p.y); }
float noise(vec2 p){ vec2 i=floor(p),f=fract(p); f=f*f*(3.0-2.0*f);
  float a=hash(i),b=hash(i+vec2(1.0,0.0)),c=hash(i+vec2(0.0,1.0)),d=hash(i+vec2(1.0,1.0));
  return mix(mix(a,b,f.x),mix(c,d,f.x),f.y); }
float fbm(vec2 p){ float v=0.0,a=0.5; mat2 m=mat2(1.6,1.2,-1.2,1.6);
  for(int i=0;i<5;i++){ v+=a*noise(p); p=m*p; a*=0.5; } return v; }
float band(float x,float s){ return pow(0.5+0.5*sin(x),s); }

void main(){
  vec2 fc=gl_FragCoord.xy;
  vec2 p=(fc-0.5*u_res)/u_res.y;
  vec2 c=(u_center-0.5*u_res)/u_res.y;
  vec2 m=(u_mouse-0.5*u_res)/u_res.y;
  vec2 q=p-c; float r=length(q); float ang=atan(q.y,q.x); float t=u_time;

  // 流れる音場（ドメインワープ）
  vec2 w=vec2(fbm(q*1.6+t*0.05), fbm(q*1.6-t*0.04+5.2));
  float field=fbm(q*1.9+(w-0.5)*1.3+t*0.03);
  float rr=r+0.05*(w.x-0.5)+0.03*(field-0.5);

  // ポインタの波紋（局所）
  float md=length(p-m);
  rr+=u_mi*0.04*exp(-md*7.0)*sin(md*42.0-t*3.0);

  // 倍音リングの放射（外へ）
  float k=26.0;
  float rings=band(rr*k-t*1.0,18.0)+band(rr*k*0.62-t*0.8,18.0)*0.6+band(rr*k*0.40-t*0.6,18.0)*0.4;
  rings*=smoothstep(1.0,0.18,r);

  vec3 page=vec3(0.055,0.047,0.125);
  vec3 violet=vec3(0.486,0.384,0.839);
  vec3 blue=vec3(0.275,0.518,0.878);
  vec3 cyan=vec3(0.376,0.808,0.878);

  float aura=exp(-r*2.2);
  vec3 col=page;
  col+=aura*mix(violet,blue,0.5+0.4*sin(ang+t*0.1))*0.24;
  col+=field*mix(violet,blue,0.5)*0.05;
  col+=rings*mix(blue,cyan,smoothstep(0.0,0.55,r))*0.16;

  // シアン一点：特定半径の明るいリング
  float accent=band(rr*k-t*1.0,42.0)*smoothstep(0.5,0.16,abs(r-0.30));
  col+=cyan*accent*0.26;
  // ポインタ近傍のかすかな発光
  col+=cyan*exp(-md*5.0)*0.05*u_mi;

  // 粒子・周辺減光
  col+=(hash(fc*0.5+t)-0.5)*0.015;
  col=mix(col,page,smoothstep(0.55,1.28,length(p)));
  gl_FragColor=vec4(col,1.0);
}
</script>

<script>
(function(){
  var cv=document.getElementById('gl');
  var glOpts={antialias:true, preserveDrawingBuffer:true};
  var gl=cv.getContext('webgl',glOpts)||cv.getContext('experimental-webgl',glOpts);
  if(!gl){ document.getElementById('fb').style.display='flex'; cv.style.display='none'; return; }
  var REDUCE=window.matchMedia&&matchMedia('(prefers-reduced-motion:reduce)').matches;
  var DPR=Math.min(window.devicePixelRatio||1,2);

  function sh(type,src){ var s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
    if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){ console.error(gl.getShaderInfoLog(s)); } return s; }
  var prog=gl.createProgram();
  gl.attachShader(prog, sh(gl.VERTEX_SHADER, document.getElementById('vs').textContent));
  gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, document.getElementById('fs').textContent));
  gl.linkProgram(prog); gl.useProgram(prog);
  var buf=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1, 3,-1, -1,3]),gl.STATIC_DRAW);
  var la=gl.getAttribLocation(prog,'a'); gl.enableVertexAttribArray(la); gl.vertexAttribPointer(la,2,gl.FLOAT,false,0,0);
  var uRes=gl.getUniformLocation(prog,'u_res'), uTime=gl.getUniformLocation(prog,'u_time'),
      uMouse=gl.getUniformLocation(prog,'u_mouse'), uCenter=gl.getUniformLocation(prog,'u_center'),
      uMi=gl.getUniformLocation(prog,'u_mi');

  var icon=document.getElementById('icon');
  var W=0,H=0, mouseX=0,mouseY=0, mi=0;
  function size(){ W=Math.round(innerWidth*DPR); H=Math.round(innerHeight*DPR);
    cv.width=W; cv.height=H; cv.style.width=innerWidth+'px'; cv.style.height=innerHeight+'px';
    gl.viewport(0,0,W,H); }
  size(); addEventListener('resize',size);
  // device px・原点左下に合わせる（gl_FragCoord 基準）
  function centerPx(){ var b=icon.getBoundingClientRect();
    return [ (b.left+b.width/2)*DPR, (innerHeight-(b.top+b.height/2))*DPR ]; }
  addEventListener('pointermove',function(e){ mouseX=e.clientX*DPR; mouseY=(innerHeight-e.clientY)*DPR; mi=1; },{passive:true});
  addEventListener('pointerleave',function(){ mi=0; });

  var visible=true;
  if('IntersectionObserver' in window){ new IntersectionObserver(function(es){ visible=es[0].isIntersecting; },{threshold:0}).observe(document.querySelector('.hero')); }

  var t0=null, raf, miS=0;
  function frame(ts){
    raf=requestAnimationFrame(frame);
    if(!visible) return;
    if(t0===null)t0=ts; var t=(ts-t0)/1000;
    miS+=((mi)-miS)*0.08; // なめらかに反応
    gl.uniform2f(uRes,W,H);
    gl.uniform1f(uTime,t);
    gl.uniform2f(uMouse,mouseX,mouseY);
    var c=centerPx(); gl.uniform2f(uCenter,c[0],c[1]);
    gl.uniform1f(uMi,miS);
    gl.drawArrays(gl.TRIANGLES,0,3);
  }
  if(REDUCE){ // 静止画1枚
    size(); var c=centerPx(); gl.uniform2f(uRes,W,H); gl.uniform1f(uTime,2.0);
    gl.uniform2f(uMouse,W*0.5,H*0.5); gl.uniform2f(uCenter,c[0],c[1]); gl.uniform1f(uMi,0.0);
    gl.drawArrays(gl.TRIANGLES,0,3);
  } else {
    raf=requestAnimationFrame(frame);
    document.addEventListener('visibilitychange',function(){ if(document.hidden){cancelAnimationFrame(raf);} else {t0=null;raf=requestAnimationFrame(frame);} });
  }
})();
</script>
</body>
</html>
